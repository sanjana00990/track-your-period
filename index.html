<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Period Tracker Website</title>
    <link rel="stylesheet" href="tracker-styles.css">
</head>
<body>
    <div class="min-h-screen bg-gradient-to-r from-orange-300 via-pink-400 to-pink-500 flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden relative">
            <!-- Header -->
            <div class="bg-orange-100 px-6 py-4 flex items-center justify-center border-b border-orange-200">
                <h1 class="text-orange-900 text-lg font-semibold">Calendar</h1>
            </div>

            <!-- Main Content -->
            <div class="p-6">
                <div id="datepickerInfo" class="mb-6 p-4 bg-orange-50 rounded-xl border border-orange-200">
                    <p class="text-sm text-orange-800 mb-2">Select your last period start date:</p>
                    <p class="text-xs text-orange-600">Click on a date in the calendar below</p>
                </div>

                

                <!-- cycle and period length inputs  -->
                    <div class="bg-orange-50 p-4 rounded-2xl border border-orange-200">
                        <label for="cycleLength" class="block mb-2 text-sm text-orange-800 font-medium">
                            Cycle Length (days)
                        </label>
                        <input
                            type="number"
                            id="cycleLength"
                            value="28"
                            min="21"
                            max="35"
                            class="w-full px-4 py-3 rounded-lg border border-orange-200 bg-white focus:outline-none focus:ring-2 focus:ring-orange-400"
                        />
                        <p class="text-xs text-orange-600 mt-1">21-35 days</p>
                    </div>

                    <!-- Period Length -->
                    <div class="bg-pink-50 p-4 rounded-2xl border border-pink-200">
                        <label for="periodLength" class="block mb-2 text-sm text-pink-800 font-medium">
                            Period Length (days)
                        </label>
                        <input
                            type="number"
                            id="periodLength"
                            value="5"
                            min="3"
                            max="7"
                            class="w-full px-4 py-3 rounded-lg border border-pink-200 bg-white focus:outline-none focus:ring-2 focus:ring-pink-400"
                        />
                        <p class="text-xs text-pink-600 mt-1">3-7 days</p>
                    </div>
                </div>

                <!-- Calendar Section -->
                <div class="mb-6 bg-amber-50 p-5 rounded-2xl border border-orange-100">
                    <!-- Calendar Header -->
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-orange-900 text-lg font-semibold">Calendar</h2>
                        <div class="flex items-center gap-4">
                            <span id="monthDisplay" class="text-orange-700 font-medium"></span>
                            <div class="flex items-center gap-2">
                                <button id="prevBtn" class="p-1 hover:bg-orange-100 rounded-full transition-colors">
                                    <svg class="w-5 h-5 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                                    </svg>
                                </button>
                                <button id="nextBtn" class="p-1 hover:bg-orange-100 rounded-full transition-colors">
                                    <svg class="w-5 h-5 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Week Days -->
                    <div class="grid grid-cols-7 gap-2 mb-2">
                        <div class="text-center text-xs text-orange-600 py-2">Sun</div>
                        <div class="text-center text-xs text-orange-600 py-2">Mon</div>
                        <div class="text-center text-xs text-orange-600 py-2">Tue</div>
                        <div class="text-center text-xs text-orange-600 py-2">Wed</div>
                        <div class="text-center text-xs text-orange-600 py-2">Thu</div>
                        <div class="text-center text-xs text-orange-600 py-2">Fri</div>
                        <div class="text-center text-xs text-orange-600 py-2">Sat</div>
                    </div>

                    <!-- Calendar Days -->
                    <div id="calendarGrid" class="grid grid-cols-7 gap-2">
                        
                    </div>
                </div>

                <!-- Info Section (shown after date is selected) -->
                <div id="infoSection" style="display: none;" class="space-y-4 mt-6">
                    <div class="bg-pink-400 rounded-2xl p-6 text-white shadow-lg">
                        <p class="text-sm opacity-90 mb-2 font-medium">Next Period</p>
                        <p id="nextPeriodDate" class="text-2xl font-bold"></p>
                    </div>
                    <div class="flex gap-3 text-xs mt-4">
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded-full bg-pink-500"></div>
                            <span class="text-orange-700">Period</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="tracker-script.js"></script>
</body>
</html>
